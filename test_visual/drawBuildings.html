<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NTU Campus Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            width: 100%;
            height: 90vh;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地图（定位到 NTU）
        const map = L.map('map').setView([1.3483, 103.6825], 16);

        // 底图
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // ==========================
        // 加载道路
        // ==========================
        // fetch('/getData/ntu_roads.geojson')
        //     .then(res => res.json())
        //     .then(data => {
        //         L.geoJSON(data, {
        //             style: {
        //                 color: '#4285F4',
        //                 weight: 3,
        //                 opacity: 0.8
        //             }
        //         }).addTo(map);
        //     });

        // ==========================
        // 加载建筑
        // ==========================
        // drawBuildings.html 在 test_visual/ 下，getData 在上一级目录，所以路径应为 ../getData/...
        fetch('../getData/ntu_buildings.geojson')
            .then(res => {
                if (!res || !res.ok) throw new Error('网络响应失败或文件未找到: ' + (res && res.status));
                return res.json();
            })
            .then(data => {
                console.log('加载建筑 GeoJSON，feature 数量：', (data.features && data.features.length) || 0);
                L.geoJSON(data, {
                    style: {
                        fillColor: '#EA4335',
                        color: '#C21E56',
                        weight: 1,
                        fillOpacity: 0.6
                    },
                    onEachFeature: function(feature, layer) {
                        const name = feature && feature.properties && feature.properties.name;
                        if (name) layer.bindPopup(String(name));
                    }
                }).addTo(map);
            })
            .catch(err => {
                console.error('读取建筑 GeoJSON 失败：', err);
                alert('读取建筑 GeoJSON 失败，查看控制台错误信息');
            });
    </script>
</body>
</html>
